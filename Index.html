<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gaming Zone</title>
  <style>
  body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #0f172a, #020617);
  color: white;
  text-align: center;
}

header {
  background: #020617;
  padding: 20px;
  font-size: 30px;
  color: #22c55e;
  text-shadow: 0 0 10px #22c55e;
}

.games {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  width: 220px;
  box-shadow: 0 0 15px #22c55e33;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px #22c55e;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #22c55e;
  color: black;
  border-radius: 5px;
  cursor: pointer;
  box-shadow: 0 0 10px #22c55e;
}
}
